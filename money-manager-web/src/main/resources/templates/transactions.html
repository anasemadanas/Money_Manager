<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transactions - Money Manager</title>
    <link rel="stylesheet" th:href="@{/web.css}">
</head>
<body>
<header class="topbar">
    <div class="nav-shell">
        <a class="brand" href="/">Money Manager</a>
        <nav aria-label="Primary navigation">
            <a href="/">Dashboard</a>
            <a href="/transactions" aria-current="page">Transactions</a>
        </nav>
        <div class="nav-account">
            <span class="user-chip" th:text="${username}">user</span>
            <form method="post" action="/logout">
                <button type="submit" class="link-button">Sign out</button>
            </form>
        </div>
    </div>
</header>

<main class="page">
    <section class="page-hero">
        <div>
            <p class="eyebrow">Activity</p>
            <h1>Transactions</h1>
            <p class="muted">Record income and expenses, then review your history.</p>
        </div>
    </section>

    <div class="alert success" th:if="${message}" th:text="${message}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="panel entry-panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">New entry</p>
                <h2>Add transaction</h2>
            </div>
        </div>
        <form method="post" action="/transactions" class="transaction-form">
            <label>
                Name
                <input name="name" placeholder="e.g. Groceries" required>
            </label>
            <label>
                Amount
                <input name="amount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
            </label>
            <label>
                Category
                <select name="category" required>
                    <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">Food</option>
                </select>
            </label>
            <label>
                Type
                <select name="txType" required>
                    <option value="EXPENSE">Expense</option>
                    <option value="INCOME">Income</option>
                </select>
            </label>
            <label>
                Date
                <input name="txDate" type="date" th:value="${today}" required>
            </label>
            <button type="submit">Save entry</button>
        </form>
    </section>

    <section class="panel">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">Ledger</p>
                <h2>Transaction history</h2>
            </div>
        </div>
        <p class="empty" th:if="${transactions.isEmpty()}">No transactions recorded yet.</p>
        <table th:if="${!transactions.isEmpty()}">
            <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Category</th>
                <th>Type</th>
                <th class="number">Amount</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${transactions}">
                <td class="muted-cell" th:text="${tx.txDate()}">2026-05-17</td>
                <td class="strong-cell" th:text="${tx.name()}">Groceries</td>
                <td th:text="${tx.category()}">Food</td>
                <td>
                    <span class="status-pill"
                          th:classappend="${tx.txType() == 'INCOME'} ? ' income' : ' expense'"
                          th:text="${tx.txType()}">EXPENSE</span>
                </td>
                <td class="number amount" th:text="${'$' + tx.amount()}">$0</td>
                <td class="actions">
                    <form method="post" action="/transactions/delete">
                        <input type="hidden" name="transactionId" th:value="${tx.transactionId()}">
                        <button type="submit" class="danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
