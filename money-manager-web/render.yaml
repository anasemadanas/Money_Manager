services:
  - type: web
    name: money-manager
    env: docker
    plan: free

    dockerfilePath: Dockerfile

    healthCheckPath: /login

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Paste the Render Postgres Internal Database URL during Blueprint setup,
      # or add it in Environment for an existing service.
      - key: DATABASE_URL
        sync: false
