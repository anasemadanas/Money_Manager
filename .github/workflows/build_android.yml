name: Build Android APKs

on:
  workflow_dispatch:
  push:
    paths:
      - "android-app/**"
      - "android-app-web/**"
      - ".github/workflows/build_android.yml"
  pull_request:
    paths:
      - "android-app/**"
      - "android-app-web/**"
      - ".github/workflows/build_android.yml"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Offline app
            project: android-app
            artifact: money-manager-offline-debug
          - name: Web companion app
            project: android-app-web
            artifact: money-manager-web-companion-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: ${{ matrix.project }}
        run: bash ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.project }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
