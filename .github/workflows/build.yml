name: Build JavaFX Native Installers

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: ubuntu-latest
            artifact_name: Linux
          - os: macos-14 
            artifact_name: MacOS-ARM64
          - os: macos-13
            artifact_name: MacOS-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        run: |
          cd money-manager
          mvn clean package -DskipTests
          mkdir -p target/installer-input
          cp target/money-manager-*.jar target/installer-input/money-manager.jar
        shell: bash

      - name: Build DEB (Linux)
        if: runner.os == 'Linux'
        run: |
          cd money-manager
          
          # Build App Image (extracted folder)
          jpackage \
            --type app-image \
            --name MoneyManager \
            --input target/installer-input \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.Launcher \
            --dest output
            
          # Build DEB installer
          jpackage \
            --type deb \
            --name MoneyManager \
            --input target/installer-input \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.Launcher \
            --dest output \
            --linux-shortcut \
            --linux-menu-group Office \
            --linux-app-category Office
        shell: bash

      - name: Install WiX
        if: runner.os == 'Windows'
        run: choco install wixtoolset --yes

      - name: Build EXE and MSI (Windows)
        if: runner.os == 'Windows'
        run: |
          cd money-manager
          
          # Build Windows App Image
          jpackage ^
            --type app-image ^
            --name MoneyManager ^
            --input target/installer-input ^
            --main-jar money-manager.jar ^
            --main-class com.moneymanager.MainApp ^
            --dest output

          # Build EXE
          jpackage ^
            --type exe ^
            --name MoneyManager ^
            --input target/installer-input ^
            --main-jar money-manager.jar ^
            --main-class com.moneymanager.MainApp ^
            --dest output ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut

          # Build MSI
          jpackage ^
            --type msi ^
            --name MoneyManager ^
            --input target/installer-input ^
            --main-jar money-manager.jar ^
            --main-class com.moneymanager.MainApp ^
            --dest output ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut
        shell: cmd
        
      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          cd money-manager
          
          # Build macOS App Image (.app bundle)
          jpackage \
            --type app-image \
            --name MoneyManager \
            --input target/installer-input \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.Launcher \
            --dest output \
            --mac-package-name "Money Manager" \
            --mac-package-identifier com.moneymanager.app
            
          # Build DMG Installer
          jpackage \
            --type dmg \
            --name MoneyManager \
            --input target/installer-input \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.Launcher \
            --dest output \
            --mac-package-name "Money Manager" \
            --mac-package-identifier com.moneymanager.app
        shell: bash

      - name: Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-${{ matrix.artifact_name }}
          path: money-manager/output/