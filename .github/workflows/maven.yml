name: Build JavaFX App (All Platforms)

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows-EXE
          - os: ubuntu-latest
            artifact_name: Linux-DEB
          - os: macos-latest # Apple Silicon
            artifact_name: MacOS-ARM64
          - os: macos-13 # Intel x64
            artifact_name: MacOS-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Fat JAR
        run: |
          cd money-manager
          mvn clean package -DskipTests
          # ننسخ ملف الـ JAR ليكون ثابتاً
          cp target/money-manager-*.jar target/app.jar
        shell: bash

      # ---------------- WINDOWS (EXE) ----------------
      - name: Build Windows EXE
        if: runner.os == 'Windows'
        run: |
          cd money-manager
          jpackage \
            --type exe \
            --name MoneyManager \
            --input target \
            --main-jar app.jar \
            --main-class com.moneymanager.App \
            --dest output \
            --win-dir-chooser \
            --win-shortcut \
            --win-console
        shell: bash

      # ---------------- LINUX (DEB) ----------------
      - name: Build Linux DEB
        if: runner.os == 'Linux'
        run: |
          cd money-manager
          jpackage \
            --type deb \
            --name MoneyManager \
            --input target \
            --main-jar app.jar \
            --main-class com.moneymanager.App \
            --dest output
        shell: bash

      # ---------------- MACOS (DMG) ----------------
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          cd money-manager
          jpackage \
            --type dmg \
            --name "MoneyManager-${{ matrix.artifact_name }}" \
            --input target \
            --main-jar app.jar \
            --main-class com.moneymanager.App \
            --dest output \
            --mac-package-identifier com.moneymanager.app \
            --mac-package-name "Money Manager"
        shell: bash

      # ---------------- UPLOAD ----------------
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            money-manager/output/*.exe
            money-manager/output/*.msi
            money-manager/output/*.deb
            money-manager/output/*.dmg
