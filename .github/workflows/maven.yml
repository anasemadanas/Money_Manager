name: Build JavaFX Native Installers

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        run: |
          cd money-manager
          mvn clean package -DskipTests
          mv target/money-manager-*.jar target/money-manager.jar
        shell: bash

      # ===================== LINUX (DEB) =====================
      - name: Build DEB (Linux)
        if: runner.os == 'Linux'
        run: |
          cd money-manager
          jpackage \
            --type deb \
            --name MoneyManager \
            --input target \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.MainApp \
            --dest output
        shell: bash

      # ===================== WINDOWS (EXE) =====================
      - name: Build EXE (Windows)
        if: runner.os == 'Windows'
        run: |
          cd money-manager
          jpackage \
            --type exe \
            --name MoneyManager \
            --input target \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.MainApp \
            --dest output
        shell: bash

      # ===================== MACOS (DMG) =====================
      - name: Build DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          cd money-manager
          jpackage \
            --type dmg \
            --name MoneyManager \
            --input target \
            --main-jar money-manager.jar \
            --main-class com.moneymanager.MainApp \
            --dest output
        shell: bash

      - name: Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: MoneyManager-${{ runner.os }}
          path: |
            money-manager/output/*.exe
            money-manager/output/*.msi
            money-manager/output/*.deb
            money-manager/output/*.dmg
