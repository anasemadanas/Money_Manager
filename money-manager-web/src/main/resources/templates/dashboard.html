<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Money Manager</title>
    <link rel="stylesheet" th:href="@{/web.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">Money Manager</a>
    <nav>
        <a href="/" aria-current="page">Dashboard</a>
        <a href="/transactions">Transactions</a>
        <form method="post" action="/logout">
            <button type="submit" class="link-button">Logout</button>
        </form>
    </nav>
</header>

<main class="page">
    <div class="page-title">
        <div>
            <h1>Dashboard</h1>
            <p class="muted">Signed in as <span th:text="${username}">user</span></p>
        </div>
        <a class="button" href="/transactions">Add Transaction</a>
    </div>

    <section class="metric-grid">
        <article class="metric">
            <span>Income</span>
            <strong th:text="${'$' + snapshot.monthIncome()}">$0</strong>
        </article>
        <article class="metric">
            <span>Expenses</span>
            <strong th:text="${'$' + snapshot.monthExpenses()}">$0</strong>
        </article>
        <article class="metric">
            <span>Net Balance</span>
            <strong th:text="${'$' + snapshot.netBalance()}">$0</strong>
        </article>
        <article class="metric">
            <span>Available</span>
            <strong th:text="${'$' + snapshot.availableBalance()}">$0</strong>
        </article>
    </section>

    <section class="content-grid">
        <article class="panel">
            <h2>Expense Categories</h2>
            <p class="empty" th:if="${snapshot.categoryBreakdown().isEmpty()}">No expenses this month.</p>
            <table th:if="${!snapshot.categoryBreakdown().isEmpty()}">
                <thead>
                <tr><th>Category</th><th class="number">Amount</th></tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${snapshot.categoryBreakdown()}">
                    <td th:text="${entry.key}">Food</td>
                    <td class="number" th:text="${'$' + entry.value}">$0</td>
                </tr>
                </tbody>
            </table>
        </article>

        <article class="panel">
            <h2>Six Month Trend</h2>
            <table>
                <thead>
                <tr><th>Month</th><th class="number">Income</th><th class="number">Expenses</th></tr>
                </thead>
                <tbody>
                <tr th:each="trend : ${snapshot.monthlyTrend()}">
                    <td th:text="${trend.month() + '/' + trend.year()}">5/2026</td>
                    <td class="number" th:text="${'$' + trend.income()}">$0</td>
                    <td class="number" th:text="${'$' + trend.expenses()}">$0</td>
                </tr>
                </tbody>
            </table>
        </article>
    </section>
</main>
</body>
</html>
