<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transactions - Money Manager</title>
    <link rel="stylesheet" th:href="@{/web.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/">Money Manager</a>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/transactions" aria-current="page">Transactions</a>
        <form method="post" action="/logout">
            <button type="submit" class="link-button">Logout</button>
        </form>
    </nav>
</header>

<main class="page">
    <div class="page-title">
        <div>
            <h1>Transactions</h1>
            <p class="muted">Signed in as <span th:text="${username}">user</span></p>
        </div>
    </div>

    <div class="alert success" th:if="${message}" th:text="${message}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <section class="panel">
        <h2>Add Transaction</h2>
        <form method="post" action="/transactions" class="transaction-form">
            <label>
                Name
                <input name="name" required>
            </label>
            <label>
                Amount
                <input name="amount" type="number" min="0.01" step="0.01" required>
            </label>
            <label>
                Category
                <select name="category" required>
                    <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">Food</option>
                </select>
            </label>
            <label>
                Type
                <select name="txType" required>
                    <option value="EXPENSE">Expense</option>
                    <option value="INCOME">Income</option>
                </select>
            </label>
            <label>
                Date
                <input name="txDate" type="date" th:value="${today}" required>
            </label>
            <button type="submit">Add</button>
        </form>
    </section>

    <section class="panel">
        <h2>History</h2>
        <p class="empty" th:if="${transactions.isEmpty()}">No transactions yet.</p>
        <table th:if="${!transactions.isEmpty()}">
            <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Category</th>
                <th>Type</th>
                <th class="number">Amount</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.txDate()}">2026-05-17</td>
                <td th:text="${tx.name()}">Groceries</td>
                <td th:text="${tx.category()}">Food</td>
                <td th:text="${tx.txType()}">EXPENSE</td>
                <td class="number" th:text="${'$' + tx.amount()}">$0</td>
                <td class="actions">
                    <form method="post" action="/transactions/delete">
                        <input type="hidden" name="transactionId" th:value="${tx.transactionId()}">
                        <button type="submit" class="danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
