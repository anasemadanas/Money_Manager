name: Build JavaFX App

on:
  workflow_dispatch:

jobs:

  build:

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: |
          cd money-manager
          mvn clean package
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: money-manager-${{ matrix.os }}
          path: money-manager/target/*
